<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elusive 9 HQ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      color: #000000;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: clamp(1.8rem, 8.5vw, 4.5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      text-transform: uppercase;
      color: #000;
      white-space: nowrap;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      font-size: clamp(0.85rem, 3.5vw, 1.35rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #000;
      margin-bottom: 3rem;
    }

    .tagline {
      font-size: clamp(1rem, 4vw, 1.4rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #000;
      margin-bottom: 1.25rem;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #000;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      padding: 13px 22px;
      min-width: 200px;
      border: 1px solid #000;
      cursor: pointer;
      user-select: none;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    .badge:hover { transform: translateY(-2px); }
    .badge:active { transform: translateY(0); opacity: 0.85; }

    .badge svg { flex-shrink: 0; }

    .badge-text { display: flex; flex-direction: column; text-align: left; }
    .badge-text .top {
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      line-height: 1;
      
    }
    .badge-text .main {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    /* Coming soon overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .overlay.open {
      display: flex;
      opacity: 1;
    }

    .overlay-card {
      position: relative;
      background: #fff;
      color: #000;
      border-radius: 16px;
      padding: 3rem 2rem 2.5rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
      transform: translateY(12px);
      transition: transform 0.2s ease;
    }

    .overlay.open .overlay-card { transform: translateY(0); }

    .overlay-card h2 {
      font-size: clamp(1.5rem, 7vw, 2.25rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      line-height: 1.05;
      margin-bottom: 0.75rem;
    }

    .overlay-card p {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #555;
    }

    .overlay-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 38px;
      height: 38px;
      border: none;
      background: transparent;
      color: #000;
      font-size: 1.6rem;
      line-height: 1;
      cursor: pointer;
      border-radius: 10px;
      transition: background 0.12s ease;
    }

    .overlay-close:hover { background: rgba(0, 0, 0, 0.07); }
  </style>
</head>
<body>
  <div class="container">

    <h1>Elusive 9 HQ</h1>
    <p class="subtitle">Memory Systems</p>

    <p class="tagline">Mindware App &mdash; Coming Soon</p>

    <div class="buttons">

      <a href="#" class="badge" aria-label="Download on the App Store" onclick="showComingSoon(event)">
        <svg width="22" height="27" viewBox="0 0 170 170" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M150.37 130.25c-2.45 5.66-5.35 10.87-8.71 15.66-4.58 6.53-8.33 11.05-11.22 13.56-4.48 4.12-9.28 6.23-14.42 6.35-3.69 0-8.14-1.05-13.32-3.18-5.197-2.12-9.973-3.17-14.34-3.17-4.58 0-9.492 1.05-14.746 3.17-5.262 2.13-9.501 3.24-12.742 3.35-4.929.21-9.842-1.96-14.746-6.52-3.13-2.73-7.045-7.41-11.735-14.04-5.032-7.08-9.169-15.29-12.41-24.65-3.471-10.11-5.211-19.9-5.211-29.378 0-10.857 2.346-20.221 7.045-28.068 3.693-6.303 8.606-11.275 14.755-14.925s12.793-5.51 19.948-5.629c3.915 0 9.049 1.211 15.429 3.591 6.362 2.388 10.447 3.599 12.238 3.599 1.339 0 5.877-1.416 13.57-4.239 7.275-2.618 13.415-3.702 18.445-3.275 13.63 1.1 23.87 6.473 30.68 16.153-12.19 7.386-18.22 17.731-18.1 31.002.11 10.337 3.86 18.939 11.23 25.769 3.34 3.17 7.07 5.62 11.22 7.36-.9 2.61-1.85 5.11-2.86 7.51zM119.11 7.24c0 8.102-2.96 15.667-8.86 22.669-7.12 8.324-15.732 13.134-25.071 12.375a25.222 25.222 0 0 1-.188-3.115c0-7.778 3.386-16.102 9.399-22.908 3.002-3.446 6.82-6.311 11.45-8.597 4.62-2.252 8.99-3.497 13.1-3.71.12 1.035.17 2.07.17 3.286z"/>
        </svg>
        <span class="badge-text">
          <span class="top">Download on the</span>
          <span class="main">App Store</span>
        </span>
      </a>

      <a href="#" class="badge" aria-label="Get it on Google Play" onclick="showComingSoon(event)">
        <svg width="26" height="30" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gp1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00C3FF"/>
              <stop offset="100%" stop-color="#1976D2"/>
            </linearGradient>
            <linearGradient id="gp2" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#FFD740"/>
              <stop offset="100%" stop-color="#F57C00"/>
            </linearGradient>
            <linearGradient id="gp3" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#FF4E50"/>
              <stop offset="100%" stop-color="#C62828"/>
            </linearGradient>
            <linearGradient id="gp4" x1="0%" y1="100%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#00E676"/>
              <stop offset="100%" stop-color="#388E3C"/>
            </linearGradient>
          </defs>
          <path fill="url(#gp1)" d="M30 470 L30 42 L270 256 Z"/>
          <path fill="url(#gp2)" d="M30 42 L390 215 L270 256 Z"/>
          <path fill="url(#gp4)" d="M270 256 L390 297 L30 470 Z"/>
          <path fill="url(#gp3)" d="M390 215 L460 256 L390 297 L270 256 Z"/>
        </svg>
        <span class="badge-text">
          <span class="top">Get it on</span>
          <span class="main">Google Play</span>
        </span>
      </a>

    </div>

  </div>

  <div class="overlay" id="comingSoonOverlay" onclick="hideComingSoon(event)" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
    <div class="overlay-card">
      <button class="overlay-close" aria-label="Close" onclick="hideComingSoon(event)">&times;</button>
      <h2 id="overlayTitle">Coming Soon</h2>
      <p>The app isn&rsquo;t available just yet &mdash; check back shortly.</p>
    </div>
  </div>

  <script>
    var overlay = document.getElementById('comingSoonOverlay');

    function showComingSoon(e) {
      if (e) e.preventDefault();
      overlay.classList.add('open');
    }

    function hideComingSoon(e) {
      // Don't close when clicking inside the card (except the close button)
      if (e && e.target.closest('.overlay-card') && !e.target.closest('.overlay-close')) return;
      overlay.classList.remove('open');
    }

    // Close on Escape key
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') overlay.classList.remove('open');
    });
  </script>
</body>
</html>
